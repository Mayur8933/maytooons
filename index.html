<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maytooons — Be curious, Be creative</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    background: #FFFFFF;
    width: 100%; min-height: 100vh;
  }
  body {
    font-family: 'Nunito', sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden; cursor: none;
  }

  /* ===================== */
  /* LOADER OVERLAY        */
  /* ===================== */
  #loader {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 1000;
    transition: opacity 0.6s ease, backdrop-filter 0.6s ease;
  }
  #loader.fade-out {
    opacity: 0;
    pointer-events: none;
  }
  #loader img {
    width: 150px;
    height: 300px;
    object-fit: contain;
    animation: loader-shake 0.3s ease-in-out infinite;
  }
  #loader-text {
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    color: #1a1a1a;
    letter-spacing: 1px;
    animation: loader-pulse 1s ease-in-out infinite;
  }
  @keyframes loader-shake {
    0%,100% { transform: translateX(0) rotate(0); }
    20%     { transform: translateX(-6px) rotate(-3deg); }
    40%     { transform: translateX(6px) rotate(3deg); }
    60%     { transform: translateX(-4px) rotate(-2deg); }
    80%     { transform: translateX(4px) rotate(2deg); }
  }
  @keyframes loader-pulse {
    0%,100% { opacity: 1; }
    50%     { opacity: 0.4; }
  }

  /* ===================== */
  /* MAIN PAGE             */
  /* ===================== */
  .cursor {
    width: 16px; height: 16px;
    background: #FFD93D;
    border: 2px solid #1a1a1a;
    border-radius: 50%;
    position: fixed; pointer-events: none;
    z-index: 9999; transform: translate(-50%,-50%);
    transition: width 0.2s, height 0.2s;
  }
  .cursor.big { width: 36px; height: 36px; }

  .stage {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px; padding: 10px;
  }

  .logo-img {
    height: 60px; object-fit: contain; margin-bottom: 4px;
  }

  .tagline {
    font-size: 12px; color: #aaa;
    letter-spacing: 3px; text-transform: uppercase;
    font-weight: 700; text-align: center; margin-bottom: 8px;
  }

  .mood-badge {
    background: transparent; color: #1a1a1a;
    font-family: 'Fredoka One', cursive;
    font-size: 13px; padding: 4px 16px;
    border-radius: 20px; letter-spacing: 1px;
    opacity: 0; transition: opacity 0.4s; margin-bottom: 4px;
    min-height: 28px;
  }
  .mood-badge.show { opacity: 1; }

  .char-area {
    position: relative;
    width: 150px;
    height: 300px;
  }

  .char-wrap {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .char-img {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 150px;
    height: 300px;
    object-fit: contain;
    object-position: bottom center;
    display: none;
  }
  .char-img.visible {
    display: block;
  }

  .bubble {
    background: #FFD93D;
    border: none;
    border-radius: 18px 18px 18px 4px;
    padding: 8px 14px;
    font-size: 13px; font-weight: 800; color: #1a1a1a;
    position: absolute;
    top: 10px;
    left: 160px;
    white-space: nowrap;
    animation: pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    z-index: 10;
  }

  .mood-section {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px; margin-top: 4px; padding-bottom: 40px;
  }
  .mood-label {
    font-size: 12px; color: #bbb;
    letter-spacing: 2px; text-transform: uppercase; font-weight: 700;
  }
  .moods { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }
  .mood-btn {
    background: transparent;
    border: none;
    border-radius: 50px;
    padding: 5px 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 800;
    cursor: none; transition: all 0.2s ease;
    color: #1a1a1a;
  }
  .mood-btn:hover, .mood-btn.active {
    background: #FFD93D;
    transform: translateY(-2px);
  }

  @keyframes pop-in {
    0%   { opacity:0; transform: scale(0.5); }
    100% { opacity:1; transform: scale(1); }
  }
  @keyframes ripple-out {
    0%   { width:0; height:0; opacity:1; }
    100% { width:80px; height:80px; opacity:0; margin:-40px; }
  }

  .ripple {
    position: fixed; pointer-events: none; border-radius: 50%;
    border: 2px solid #FFD93D;
    animation: ripple-out 0.5s ease-out forwards; z-index: 100;
  }
  .footer {
    position: fixed; bottom: 14px;
    font-size: 11px; color: #ccc;
    letter-spacing: 2px; font-weight: 700; text-transform: uppercase;
  }
</style>
</head>
<body>

  <!-- LOADER -->
  <div id="loader">
    <img src="./images/scare.gif" alt="scared">
    <div id="loader-text">oh no... it's loading 😱</div>
  </div>

  <div class="cursor" id="cursor"></div>

  <div class="stage">
    <img class="logo-img" src='./images/maytooonsLogo.png' alt="">
    <div class="tagline">Be curious · Be creative</div>
    <div class="mood-badge" id="moodBadge"></div>

    <div class="char-area" id="charArea">
      <div class="char-wrap">
        <img id="char-happy"   class="char-img" src="./images/smile.gif"   alt="">
        <img id="char-excited" class="char-img" src="./images/excite.gif" alt="">
        <img id="char-scared"  class="char-img" src="./images/scare.gif"  alt="">
        <img id="char-annoyed" class="char-img" src="./images/annoy.gif" alt="">
      </div>
    </div>

    <div class="mood-section">
      <div class="mood-label">What's your vibe today?</div>
      <div class="moods">
        <button class="mood-btn active" data-mood="happy">😄 Happy</button>
        <button class="mood-btn" data-mood="excited">🤩 Excited</button>
        <button class="mood-btn" data-mood="scared">😱 Scared</button>
        <button class="mood-btn" data-mood="annoyed">😤 Annoyed</button>
        <button class="mood-btn" data-mood="">🔄 Reset</button>
      </div>
    </div>
  </div>

  <div class="footer">Maytooons © 2026</div>

<script>
  // Dismiss loader after 2.5s (or when page fully loads, whichever is later)
  const loader = document.getElementById('loader');

  function dismissLoader() {
    loader.classList.add('fade-out');
    setTimeout(() => loader.style.display = 'none', 2000);
  }

  const minDelay = new Promise(resolve => setTimeout(resolve, 2500));
  const pageLoad = new Promise(resolve => {
    if (document.readyState === 'complete') resolve();
    else window.addEventListener('load', resolve);
  });

  Promise.all([minDelay, pageLoad]).then(dismissLoader);

  // Cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
  });
  document.addEventListener('mousedown', () => cursor.classList.add('big'));
  document.addEventListener('mouseup',   () => cursor.classList.remove('big'));

  // Ripple
  document.addEventListener('click', e => {
    const r = document.createElement('div');
    r.className = 'ripple';
    r.style.left = e.clientX + 'px';
    r.style.top  = e.clientY + 'px';
    document.body.appendChild(r);
    setTimeout(() => r.remove(), 500);
  });

  const moods = {
    happy:   { img: 'char-happy',   badge: '😄 HAPPY',   bubble: "I'm so happy you're here! 😄" },
    excited: { img: 'char-excited', badge: '🤩 EXCITED', bubble: "LET'S GOOO!! 🤩" },
    scared:  { img: 'char-scared',  badge: '😱 SCARED',  bubble: "W-what was that?! 😱" },
    annoyed: { img: 'char-annoyed', badge: '😤 ANNOYED', bubble: "Not now. I'm busy 😤" },
    '':      { img: 'char-happy',   badge: '',           bubble: null },
  };

  const allChars  = document.querySelectorAll('.char-img');
  const moodBadge = document.getElementById('moodBadge');
  const charArea  = document.getElementById('charArea');

  function showMood(key) {
    const mood = moods[key] || moods[''];

    allChars.forEach(c => {
      c.classList.remove('visible');
      if (c.id === mood.img) c.classList.add('visible');
    });

    if (mood.badge) {
      moodBadge.textContent = mood.badge;
      moodBadge.classList.add('show');
    } else {
      moodBadge.classList.remove('show');
    }

    const old = charArea.querySelector('.bubble');
    if (old) old.remove();
    if (mood.bubble) {
      const b = document.createElement('div');
      b.className = 'bubble';
      b.textContent = mood.bubble;
      charArea.appendChild(b);
      setTimeout(() => { b.style.transition = 'opacity 0.4s'; b.style.opacity = '0'; }, 2500);
      setTimeout(() => b.remove(), 3000);
    }
  }

  document.addEventListener('mousemove', e => {
    const rect = charArea.getBoundingClientRect();
    const dist = Math.hypot(
      e.clientX - (rect.left + rect.width / 2),
      e.clientY - (rect.top  + rect.height / 2)
    );
    charArea.style.filter = dist < 120 ? 'drop-shadow(0 0 12px rgba(255,217,61,0.5))' : '';
  });

  setTimeout(() => showMood('happy'), 300);

  document.querySelectorAll('.mood-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      showMood(btn.dataset.mood);
    });
  });
</script>
</body>
</html>
